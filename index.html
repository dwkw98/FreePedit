<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>FreePedit 高清图片编辑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f8fa;font-family:sans-serif}
#loadPage{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#loadPage h2{font-size:20px;margin-bottom:12px}
#loadPage p{color:#777}
#verifyPage{position:fixed;inset:0;background:#fff;z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;}
.verify-box{width:330px;padding:25px;background:#fafafa;border-radius:12px;box-shadow:0 2px 10px #0002}
.slide-tip{text-align:center;margin-bottom:15px}
.slide-bar{width:100%;height:42px;background:#eee;border-radius:22px;position:relative;overflow:hidden}
.slide-bg{height:100%;width:0;background:#2588fe}
.slide-btn{width:42px;height:42px;background:#2588fe;border-radius:50%;position:absolute;left:0;top:0}
.res-text{text-align:center;margin-top:12px}
#planPage{position:fixed;inset:0;background:#fff;z-index:9997;display:none;flex-direction:column;align-items:center;justify-content:center;}
.plan-box{text-align:center;padding:30px}
.plan-box h2{margin-bottom:25px}
.free-btn{padding:13px 35px;border:none;background:#27c061;color:#fff;border-radius:8px;font-size:17px}
.desc-text{margin-top:22px;color:#666;font-size:14px}
#editPage{display:none;padding:15px}
.up-btn{display:block;margin:0 auto 10px;padding:9px 18px;background:#2588fe;color:#fff;border:none;border-radius:6px}
.canvas-box{position:relative;margin:0 auto;width:92%;border:1px solid #ddd;background:#fff}
#mainCanvas{width:100%;display:block}
.zoom-icon{position:absolute;right:10px;top:10px;width:35px;height:35px;border-radius:50%;border:none;background:#ff9500;color:#fff;font-size:16px}
.tool-row{display:flex;justify-content:center;gap:6px;margin:12px 0;flex-wrap:wrap}
.tool-item{padding:7px 10px;border:none;border-radius:6px;background:#e9e9e9;font-size:13px}
.color-inp{width:48px;height:30px;border:none}
.save-btn{display:block;margin:15px auto;padding:11px 26px;background:#27c061;color:#fff;border:none;border-radius:8px}
.tip-text{text-align:center;color:#999;font-size:13px;margin:5px 0}
.hide-file{display:none;}
</style>
</head>
<body>

<div id="loadPage">
    <h2>Loading, this may take a few minutes.</h2>
    <p>正在初始化软件...</p>
</div>

<div id="verifyPage">
    <div class="verify-box">
        <p class="slide-tip">我们需要验证你是否是人类，反抗机器人爬虫</p>
        <div class="slide-bar">
            <div class="slide-bg" id="slideBg"></div>
            <div class="slide-btn" id="slideBtn"></div>
        </div>
        <p class="res-text" id="verifyTxt"></p>
    </div>
</div>

<div id="planPage">
    <div class="plan-box">
        <h2>What's plan?</h2>
        <button class="free-btn" id="goEditBtn">free（免费）</button>
        <p class="desc-text">我是义兴里开发者，这是一个p图软件</p>
    </div>
</div>

<div id="editPage">
    <button class="up-btn" id="chooseImgBtn">开始图片</button>
    <input type="file" id="imgFile" accept="image/*" class="hide-file">
    <!-- 图中图专用文件选择 -->
    <input type="file" id="overlayImgFile" accept="image/*" class="hide-file">
    <div class="canvas-box">
        <canvas id="mainCanvas"></canvas>
        <button class="zoom-icon" id="zoomBtn">🔍</button>
    </div>
    <p class="tip-text" id="operTip">点击文字/图中图后，轻点画布任意位置放置</p>
    <div class="tool-row">
        <button class="tool-item" id="penBtn">画笔</button>
        <input type="color" class="color-inp" id="colorSel">
        <button class="tool-item" id="textBtn">文字</button>
        <button class="tool-item" id="overlayImgBtn">图中图</button>
    </div>
    <div class="tool-row">
        <button class="tool-item" id="eraserBtn">橡皮擦</button>
        <button class="tool-item" id="undoBtn">撤销</button>
        <button class="tool-item" id="clearBtn">清空</button>
        <button class="tool-item" id="rotateBtn">旋转</button>
    </div>
    <div class="tool-row">
        <button class="tool-item" id="lightBtn">提亮</button>
        <button class="tool-item" id="darkBtn">变暗</button>
    </div>
    <button class="save-btn" id="saveImgBtn">保存图片</button>
</div>

<script>
const loadPage=document.getElementById('loadPage')
const verifyPage=document.getElementById('verifyPage')
const planPage=document.getElementById('planPage')
const editPage=document.getElementById('editPage')
const slideBtn=document.getElementById('slideBtn')
const slideBg=document.getElementById('slideBg')
const verifyTxt=document.getElementById('verifyTxt')
const goEditBtn=document.getElementById('goEditBtn')
const chooseImgBtn=document.getElementById('chooseImgBtn')
const imgFile=document.getElementById('imgFile')
const overlayImgFile=document.getElementById('overlayImgFile')
const mainCanvas=document.getElementById('mainCanvas')
const zoomBtn=document.getElementById('zoomBtn')
const penBtn=document.getElementById('penBtn')
const colorSel=document.getElementById('colorSel')
const textBtn=document.getElementById('textBtn')
const overlayImgBtn=document.getElementById('overlayImgBtn')
const eraserBtn=document.getElementById('eraserBtn')
const undoBtn=document.getElementById('undoBtn')
const clearBtn=document.getElementById('clearBtn')
const lightBtn=document.getElementById('lightBtn')
const darkBtn=document.getElementById('darkBtn')
const rotateBtn=document.getElementById('rotateBtn')
const saveImgBtn=document.getElementById('saveImgBtn')
const operTip=document.getElementById('operTip')

let ctx,drawStart=false,lastX,lastY
let nowColor="#000",isBig=false,nowTool="pen"
let historyData=[],textContent="",textSize=28
let overlayImg=null
const KEY_OK="fp_ok"
const CANVAS_W=720
const CANVAS_H=720

if(localStorage.getItem(KEY_OK)){
    setTimeout(()=>{
        loadPage.style.display="none"
        editPage.style.display="block"
        initCanvas()
    },800)
}else{
    setTimeout(()=>{
        loadPage.style.display="none"
        verifyPage.style.display="flex"
    },4000)
}

let draging=false,startPos=0
slideBtn.addEventListener('mousedown',e=>{draging=true;startPos=e.clientX})
slideBtn.addEventListener('touchstart',e=>{draging=true;startPos=e.touches[0].clientX})
document.addEventListener('mousemove',slideMove)
document.addEventListener('touchmove',slideMove)
document.addEventListener('mouseup',endSlide)
document.addEventListener('touchend',endSlide)

function slideMove(e){
    if(!draging)return
    let move=e.touches?e.touches[0].clientX-startPos:e.clientX-startPos
    let maxW=slideBtn.parentElement.clientWidth-slideBtn.offsetWidth
    move=Math.max(0,Math.min(move,maxW))
    slideBtn.style.left=move+"px"
    slideBg.style.width=move+"px"
}
function endSlide(){
    if(!draging)return
    draging=false
    let barW=slideBtn.parentElement.clientWidth
    let btnW=slideBtn.offsetWidth
    let nowL=parseInt(slideBtn.style.left)||0
    if(nowL>=barW-btnW-8){
        verifyTxt.innerText="验证成功"
        verifyTxt.style.color="#27c061"
        setTimeout(()=>{
            verifyPage.style.display="none"
            planPage.style.display="flex"
        },600)
    }else{
        verifyTxt.innerText="验证失败。我们怀疑你是机器人"
        verifyTxt.style.color="#f53f3f"
        slideBtn.style.left="0px"
        slideBg.style.width="0px"
    }
}

goEditBtn.onclick=function(){
    localStorage.setItem(KEY_OK,"1")
    planPage.style.display="none"
    editPage.style.display="block"
    initCanvas()
}

function initCanvas(){
    mainCanvas.width=CANVAS_W
    mainCanvas.height=CANVAS_H
    ctx=mainCanvas.getContext("2d")
    ctx.fillStyle="#ffffff"
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H)
    saveHistory()
}
function saveHistory(){
    historyData.push(mainCanvas.toDataURL())
    if(historyData.length>30)historyData.shift()
}

chooseImgBtn.onclick=()=>imgFile.click()
imgFile.onchange=e=>{
    let file=e.target.files[0]
    if(!file)return
    let img=new Image()
    img.onload=()=>{
        ctx.clearRect(0,0,CANVAS_W,CANVAS_H)
        let scale=Math.min(CANVAS_W/img.width,CANVAS_H/img.height)
        let w=img.width*scale,h=img.height*scale
        ctx.drawImage(img,(CANVAS_W-w)/2,(CANVAS_H-h)/2,w,h)
        saveHistory()
    }
    img.src=URL.createObjectURL(file)
}

// 图中图 选择叠加图片
overlayImgBtn.onclick=function(){
    nowTool="overlay"
    setTip("选择要叠加的图片，点击画布放置图中图")
    overlayImgFile.click()
}
overlayImgFile.onchange=e=>{
    let file=e.target.files[0]
    if(!file)return
    overlayImg=new Image()
    overlayImg.src=URL.createObjectURL(file)
}

zoomBtn.onclick=function(){
    isBig=!isBig
    mainCanvas.style.maxWidth=isBig?"750px":"92%"
    zoomBtn.innerText=isBig?"➖":"🔍"
}

penBtn.onclick=()=>{nowTool="pen";setTip("自由画笔涂鸦")}
eraserBtn.onclick=()=>{nowTool="eraser";setTip("橡皮擦擦除内容")}
textBtn.onclick=()=>{
    nowTool="text"
    textContent=prompt("输入文字：","")||""
    setTip("点击画布任意位置放文字")
}
colorSel.oninput=e=>nowColor=e.target.value

// 点击画布放置文字 / 放置图中图
mainCanvas.addEventListener("click",placeClickItem)
function placeClickItem(e){
    let rect=mainCanvas.getBoundingClientRect()
    let x=(e.clientX-rect.left)*(CANVAS_W/rect.width)
    let y=(e.clientY-rect.top)*(CANVAS_H/rect.height)

    if(nowTool=="text"&&textContent){
        ctx.font=`bold ${textSize}px sans-serif`
        ctx.fillStyle=nowColor
        ctx.textAlign="left"
        ctx.fillText(textContent,x,y)
        saveHistory()
    }
    if(nowTool=="overlay"&&overlayImg){
        let ow=180,oh=180
        ctx.drawImage(overlayImg,x,y,ow,oh)
        saveHistory()
        overlayImg=null
    }
}

mainCanvas.onmousedown=startDraw
mainCanvas.ontouchstart=startDraw
mainCanvas.onmousemove=doingDraw
mainCanvas.ontouchmove=doingDraw
mainCanvas.onmouseup=stopDraw
mainCanvas.ontouchend=stopDraw

function startDraw(e){
    if(nowTool!="pen"&&nowTool!="eraser")return
    drawStart=true
    let rect=mainCanvas.getBoundingClientRect()
    let x=e.touches?e.touches[0].clientX:e.clientX
    let y=e.touches?e.touches[0].clientY:e.clientY
    lastX=(x-rect.left)*(CANVAS_W/rect.width)
    lastY=(y-rect.top)*(CANVAS_H/rect.height)
}
function doingDraw(e){
    if(!drawStart||(nowTool!="pen"&&nowTool!="eraser"))return
    e.preventDefault()
    let rect=mainCanvas.getBoundingClientRect()
    let x=e.touches?e.touches[0].clientX:e.clientX
    let y=e.touches?e.touches[0].clientY:e.clientY
    let cx=(x-rect.left)*(CANVAS_W/rect.width)
    let cy=(y-rect.top)*(CANVAS_H/rect.height)
    ctx.beginPath()
    ctx.strokeStyle=nowTool=="eraser"?"#fff":nowColor
    ctx.lineWidth=nowTool=="eraser"?22:6
    ctx.lineCap="round"
    ctx.moveTo(lastX,lastY)
    ctx.lineTo(cx,cy)
    ctx.stroke()
    lastX=cx;lastY=cy
}
function stopDraw(){
    if(drawStart)saveHistory()
    drawStart=false
}

undoBtn.onclick=function(){
    if(historyData.length<=1)return
    historyData.pop()
    let img=new Image()
    img.src=historyData[historyData.length-1]
    img.onload=()=>ctx.drawImage(img,0,0)
}
clearBtn.onclick=function(){
    ctx.fillStyle="#fff"
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H)
    saveHistory()
}
lightBtn.onclick=()=>filterImg(12)
darkBtn.onclick=()=>filterImg(-12)
function filterImg(val){
    let imgData=ctx.getImageData(0,0,CANVAS_W,CANVAS_H)
    let d=imgData.data
    for(let i=0;i<d.length;i+=4){
        d[i]+=val;d[i+1]+=val;d[i+2]+=val
    }
    ctx.putImageData(imgData,0,0)
    saveHistory()
}
rotateBtn.onclick=function(){
    ctx.save()
    ctx.translate(CANVAS_W/2,CANVAS_H/2)
    ctx.rotate(Math.PI/2)
    ctx.translate(-CANVAS_H/2,-CANVAS_W/2)
    ctx.drawImage(mainCanvas,0,0)
    ctx.restore()
    saveHistory()
}
saveImgBtn.onclick=function(){
    let a=document.createElement("a")
    a.href=mainCanvas.toDataURL("image/png",1.0)
    a.download="FreePedit编辑图.png"
    a.click()
    alert("已保存至系统相册！")
}
function setTip(t){operTip.innerText=t}
</script>
</body>
</html>
